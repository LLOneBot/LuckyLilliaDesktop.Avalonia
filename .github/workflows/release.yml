  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - release-windows
      # - release-macos
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lucky-Lillia-Desktop ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          overwrite_files: true
          files: |
            release-artifacts/lucky-lillia-desktop-win-x64/lucky-lillia-desktop-win-x64.zip
          # release-artifacts/lucky-lillia-desktop-macos-arm64/lucky-lillia-desktop-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
