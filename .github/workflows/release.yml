name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Setup MSVC dev environment
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Build and Publish
        run: |
          dotnet publish .\LuckyLilliaDesktop.csproj -c Release -r win-x64 -o .\artifacts\publish-win-x64-aot
          dir .\artifacts\publish-win-x64-aot
          (Get-Item .\artifacts\publish-win-x64-aot\LuckyLilliaDesktop.exe).Length / 1MB

      - name: Rename exe
        run: Rename-Item -Path .\artifacts\publish-win-x64-aot\LuckyLilliaDesktop.exe -NewName lucky-lillia-desktop.exe

      - name: Compress to zip
        run: Compress-Archive -Path .\artifacts\publish-win-x64-aot\lucky-lillia-desktop.exe -DestinationPath lucky-lillia-desktop-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-lillia-desktop-win-x64
          path: lucky-lillia-desktop-win-x64.zip

      - name: Setup Node.js
        if: github.event_name == 'push' && env.HAS_NPM_TOKEN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        if: github.event_name == 'push' && env.HAS_NPM_TOKEN == 'true'
        run: npm install -g npm@latest

      - name: Prepare and publish npm package
        if: github.event_name == 'push' && env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          mkdir package
          copy .\artifacts\publish-win-x64-aot\lucky-lillia-desktop.exe package\
          @"
          {
            "name": "lucky-lillia-desktop-win-x64",
            "version": "$version",
            "repository": {
              "type": "git",
              "url": "https://github.com/LLOneBot/LuckyLilliaDesktop.Avalonia"
            }
          }
          "@ | Out-File -FilePath package\package.json -Encoding utf8
          tar -czf lucky-lillia-desktop-win-x64.tgz package
          npm publish lucky-lillia-desktop-win-x64.tgz --provenance --access public

